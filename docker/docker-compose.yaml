version: '3.9'

services:
    node:
        build:
            context: .
            dockerfile: Dockerfile.node
            args:
                NODE_HOME: "${NODE_HOME}"
        container_name: node
        restart: unless-stopped
        env_file:
            - ./../env.docker
        ports:
            - "${NODE_PORT}:${NODE_PORT}"
        networks:
            - dapp_network
        volumes:
            - "./node:${NODE_HOME}"
            - "./../metadata:${NODE_HOME}/metadata"
            - "./../configs:${NODE_HOME}/configs"
            - "./../docs:${NODE_HOME}/docs"
            - "./../scripts:${NODE_HOME}/scripts"
            - "./../env.docker:${NODE_HOME}/env.docker"
            - "./entrypoint.node.sh:${NODE_HOME}/entrypoint.node.sh"
            - "./bin:${BIN_PATH}"
            - cardano_ipc:/ipc
        entrypoint: [ "/bin/bash", "-c", "${NODE_HOME}/entrypoint.node.sh" ]
    prometheus:
        image: prom/prometheus:latest
        container_name: prometheus
        restart: unless-stopped
        env_file:
            - ./../env.docker
        volumes:
            - "./config.prometheus.yml:/etc/prometheus/prometheus.yml.in:ro"
        ports:
            - "${PROMETHEUS_SCRAPER_PORT}:${PROMETHEUS_SCRAPER_PORT}"
        networks:
            - dapp_network
        entrypoint: [ "/bin/sh", "-c" ]
        command:
            - |
              sed \
                -e "s|__NODE_METRICS_PORT__|$${NODE_METRICS_PORT}|g" \
                -e "s|__PROMETHEUS_SCRAPER_PORT__|$${PROMETHEUS_SCRAPER_PORT}|g" \
                /etc/prometheus/prometheus.yml.in > /tmp/prometheus.yml
              exec /bin/prometheus \
                --config.file=/tmp/prometheus.yml \
                --web.listen-address=:$${PROMETHEUS_SCRAPER_PORT}
    grafana:
        image: grafana/grafana:latest
        container_name: grafana
        restart: unless-stopped
        volumes:
            - grafana_data:/var/lib/grafana
        environment:
            - "GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}"
        ports:
            - "${GRAFANA_PORT}:${GRAFANA_PORT}"
        networks:
            - dapp_network
    postgres:
        image: postgres:17.2-alpine
        container_name: postgres
        restart: always
        environment:
            - POSTGRES_LOGGING=true
            - POSTGRES_USER=$POSTGRES_USER
            - POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            - POSTGRES_DB=$POSTGRES_DB
        ports:
            - "${POSTGRES_PORT}:${POSTGRES_PORT}"
        volumes:
            - "./postgres:/var/lib/postgresql/data"
            - "./postgresql.conf:/etc/postgresql/postgresql.conf"
            - "./pg_hba.conf:/etc/postgresql/pg_hba.conf"
        networks:
            - dapp_network
    db-sync:
        image: ghcr.io/intersectmbo/cardano-db-sync:13.7.0.5
        container_name: db-sync
        depends_on:
            - node
            - postgres
        restart: always
        environment:
            - POSTGRES_USER=$POSTGRES_USER
            - POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            - POSTGRES_HOST=postgres
            - POSTGRES_DB=$POSTGRES_DB
            - POSTGRES_PORT=$POSTGRES_PORT
        volumes:
            - "./db-sync:/var/lib/cexplorer"
            - "./node:/node"
            - cardano_ipc:/ipc
        command: [
            "--config /node/cardano-node/db-sync-config.json",
            "--socket-path /ipc/node.socket",
        ]
        networks:
            - dapp_network

networks:
    dapp_network:

volumes:
    grafana_data:
    cardano_ipc:
